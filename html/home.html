<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <!-- cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Inter:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic"
      rel="stylesheet"
    />

    <!-- css -->
    <link rel="stylesheet" href="/css/utilities/variables.css" />
    <link rel="stylesheet" href="/css/utilities/base.css" />
    <link rel="stylesheet" href="/css/utilities/utilities.css" />
    <link rel="stylesheet" href="/css/home/header.css" />
    <link rel="stylesheet" href="/css/home/hero.css" />
  </head>

  <body>
    <div id="nav-wrapper"></div>

    <header>
      <div id="nav-wrapper"></div>
      <section class="hero">
        <div class="left">
          <h2>
            Your all-in-one platform to buy, sell, trade, and earn
            Cryptocurrencies
          </h2>
          <p>
            Open a free account in minutes right from your phone and make your
            money go further
          </p>

          <div class="input-container">
            <input type="email" id="header-email" placeholder="Enter Address" />

            <button class="header-btn pry-btn">Get Started</button>
          </div>
        </div>
        <div class="right">
          <div class="currency-container">
            <!-- container of our form -->
            <h2>Currency Converter</h2>

            <form id="converter-form">
              <div class="input-container">
                <label for="amount">Amount</label>
                <input
                  type="number"
                  id="amount"
                  placeholder="Enter Amount"
                  required
                />
              </div>
              <div class="input-container">
                <label for="from">From</label>
                <select id="from">
                  <!-- options will load here from api -->
                </select>
              </div>
              <div class="input-container">
                <label for="to">To</label>
                <select id="to">
                  <!-- options will load here from api -->
                </select>
              </div>

              <button type="submit" class="btn-form pry-btn">Convert</button>
            </form>
            <div id="result"></div>
          </div>
        </div>
      </section>

      <div class="dec1"></div>
      <div class="dec2"></div>
      <div class="dec3"></div>

      <div class="coin1"></div>
      <div class="coin2"></div>
    </header>

    <!-- footer -->
    <div id="footer-container"></div>
    <!-- js -->
    <script src="/components/js/nav.js"></script>
    <!-- js -->
    <script src="/components/js/footer.js"></script>
  </body>
</html>
